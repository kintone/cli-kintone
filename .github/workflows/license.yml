name: License

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  analyze-and-extract:
    name: Analyze and extract licenses
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: Kesin11/actions-timeline@7c7e0821d38f27460f4a71ef874a1c8cf23602e4 # v2.2.6

      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24.18.0"
          cache: "pnpm"

      - uses: flatt-security/setup-takumi-guard-npm@9a5d797c2085b6326d3a2985c08e3a114b9b88c1 # v1.1.1
        with:
          bot-id: ${{ !github.event.pull_request.head.repo.fork && secrets.TAKUMI_GUARD_BOT_ID || '' }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check licenses
        run: |
          pnpm license:analyze
          pnpm license:extract
