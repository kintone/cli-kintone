name: test-executables
on:
  push:
    branches:
      - main
      - "renovate/**"
  pull_request:

jobs:
  build-executables:
    name: Build executables
    permissions:
      contents: read
    # ubuntu上でビルドしたmacOS向けの実行ファイルが正常に動作しないため、
    # macOSランナー上でビルドする
    # ref. https://github.com/yao-pkg/pkg/issues/183
    runs-on: macos-latest
    steps:
      - uses: Kesin11/actions-timeline@7c7e0821d38f27460f4a71ef874a1c8cf23602e4 # v2.2.6
      - uses: actions/checkout@v5.0.1
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24.16.0"
          cache: "pnpm"

      - uses: flatt-security/setup-takumi-guard-npm@9a5d797c2085b6326d3a2985c08e3a114b9b88c1 # v1.1.1
        with:
          bot-id: ${{ !github.event.pull_request.head.repo.fork && secrets.TAKUMI_GUARD_BOT_ID || '' }}

      - run: pnpm install --frozen-lockfile
      - run: pnpm build:executables
      - run: jq -r '.version' ./package.json > bin/EXPECTED_VERSION
      - uses: actions/upload-artifact@v5.0.0
        with:
          name: executables
          path: bin/*
          retention-days: 1day

  test-executables:
    name: Test executables - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: build-executables

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/download-artifact@v6.0.0
        with:
          name: executables
      - run: chmod +x ./cli-kintone-*
      - run: ./cli-kintone-linux-x64 --version | tee ACTUAL_VERSION
        if: ${{ matrix.os == 'ubuntu-latest' }}
      - run: ./cli-kintone-win-x64.exe --version | tee ACTUAL_VERSION
        if: ${{ matrix.os == 'windows-latest' }}
      - run: ./cli-kintone-macos-arm64 --version | tee ACTUAL_VERSION
        if: ${{ matrix.os == 'macos-latest' }}
      - run: diff EXPECTED_VERSION ACTUAL_VERSION
