name: test-npm

on:
  push:
    branches:
      - main
      - "renovate/**"
  pull_request:

jobs:
  prepare:
    name: Prepare npm package
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.1
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24.16.0"
          cache: "pnpm"

      - uses: flatt-security/setup-takumi-guard-npm@9a5d797c2085b6326d3a2985c08e3a114b9b88c1 # v1.1.1
        with:
          bot-id: ${{ !github.event.pull_request.head.repo.fork && secrets.TAKUMI_GUARD_BOT_ID || '' }}

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm pack
      - run: mv kintone-cli-*.tgz kintone-cli.tgz
      - uses: actions/upload-artifact@v5.0.0
        with:
          name: kintone-cli.tgz
          path: kintone-cli.tgz

  test-install:
    name: Test npm install - Node.js ${{ matrix.os }} ${{ matrix.node-version }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [20, 22, 24]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/download-artifact@v6.0.0
        with:
          name: kintone-cli.tgz
      - run: npm install -g kintone-cli.tgz
      - run: cli-kintone --version

  test-npx:
    name: Test npx - Node.js ${{ matrix.os }} ${{ matrix.node-version }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [20, 22, 24]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/download-artifact@v6.0.0
        with:
          name: kintone-cli.tgz
      - run: npx kintone-cli.tgz --version
